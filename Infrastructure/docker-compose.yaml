services:
    azure-service-bus-api:
        build:
            context: ../AzureServiceBus.Publisher.Api
            dockerfile: Dockerfile
        container_name: azure-service-bus-api
        ports:
            - "9002:5055"
        environment:
            - ASPNETCORE_ENVIRONMENT=Production
            - ASPNETCORE_HTTP_PORTS=5055
            - ConnectionStrings__PostgreSql=Host=postgres;Port=5432;Username=${DB_USER};Password=${DB_PASSWORD};Database=azure-app
            - ServiceBusConnectionString=${SERVICE_BUS_CONNECTION}
            - ApplicationInsights__ConnectionString=${APP_INSIGHT}
        depends_on:
            - postgres
        networks:
            - azureservicebus
        
    azure-service-bus-functions:
        build:
            context: ../AzureServiceBus.Functions
            dockerfile: Dockerfile
        environment:
            - ConnectionStrings__PostgreSql=Host=postgres;Port=5432;Username=${DB_USER};Password=${DB_PASSWORD};Database=azure-app
            - ServiceBusConnectionString=${SERVICE_BUS_CONNECTION}
            - ApplicationInsights__ConnectionString=${APP_INSIGHT}
        depends_on:
            - postgres
        networks:
            - azureservicebus

    postgres:
        image: "postgres:latest"
        ports:
            - 5432:5432
        environment:
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB_NAME}
        volumes:
            - ./db-data/:/var/lib/postgresql
        networks:
            - azureservicebus
    
networks:
    azureservicebus:
        driver: bridge