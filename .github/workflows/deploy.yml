name: Deploy

on:
  push:
    branches:
      - development

env:
  REGISTRY: ghcr.io
  GITHUB_ACTOR_LOWER: ${{ github.actor }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./AzureServiceBus.Publisher.Api
          file: ./AzureServiceBus.Publisher.Api/Dockerfile
          push: true
          tags: ghcr.io/alexeyshulinin/azure-service-bus-api:latest

      - name: Build and push Functions image
        uses: docker/build-push-action@v5
        with:
          context: ./AzureServiceBus.Functions
          file: ./AzureServiceBus.Functions/Dockerfile
          push: true
          tags: ghcr.io/alexeyshulinin/azure-service-bus-functions:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Copy docker-compose to server
        run: |
          rsync -avz ./Infrastructure/docker-compose.light.yaml \
            -e "ssh -i ~/.ssh/id_ed25519" \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/src/AzureServiceBus/

      - name: Write .env file on server
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "echo '${{ secrets.ENV_FILE }}' > /src/AzureServiceBus/.env"

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /src/AzureServiceBus
            docker compose docker-compose.light.yaml pull
            docker compose docker-compose.light.yaml up -d
            docker image prune -f
          "